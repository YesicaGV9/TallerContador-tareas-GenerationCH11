<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Task Manager</title>
</head>
<body>
    <nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="/Tareas (1).png" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
      Contador de tareas
    </a>
  </div>
</nav>
<div class="contenedorPrincipal">
    <h1 id="titulopagina">Task Manager: organiza tu dia</h1>
    <input type="text" id="tareaIngresada" placeholder="Escribe tu tarea aqui...">
    <select name="Categorias" id="categoria">
        <option value="Estudio">Estudio</option>
        <option value="Trabajo">Trabajo</option>
        <option value="Personal">Personal</option>
        <option value="Urgente">Urgente</option>
        <option value="otra">Otra</option>
    </select>
    <input type="text" id="otraCategoria" style="display:none;">

    <button onclick="agregarTarea()">Agregar</button>
    <div id="error">
    </div>
    <div id="contenedorContador"><p>
        Completadas <br>
        <span id="completado">0</span> <br> <br>
        Tareas en total <br>
    <span id="total">0</span>
</p></div>
<ul id="lista"></ul>
<template id="template-tarea">
    <li class="tarea">
        <span class="texto-tarea"></span>
        <div class="btn-group">
            <button class="btn btn-outline-success btnHecho">✔️</button>
            <button class="btn btn-outline-warning btnUrgente">❗</button>
            <button class="btn btn-outline-danger btnEliminar">🗑️</button>
        </div>
    </li>
</template>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
